name: Release

on:
  push:
    branches:
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Determine version bump
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format="%s" --no-merges)
          else
            COMMITS=$(git log --format="%s" --no-merges ${LAST_TAG}..HEAD)
          fi

          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:|^feat!:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:|^fix!:"; then
            BUMP="patch"
          else
            echo "No version-worthy commits found. Skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Bumping $BUMP version from $CURRENT_VERSION"
          npm version $BUMP --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Generate changelog entry
        if: steps.version.outputs.skip != 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format="- %s" --no-merges)
          else
            COMMITS=$(git log --format="- %s" --no-merges ${LAST_TAG}..HEAD)
          fi
          NEW_VERSION=${{ steps.version.outputs.tag }}
          TODAY=$(date +%Y-%m-%d)
          # Determine section from bump type
          BUMP="${{ steps.version.outputs.bump }}"
          if [ "$BUMP" = "major" ]; then SECTION="Breaking Changes";
          elif [ "$BUMP" = "minor" ]; then SECTION="Features";
          else SECTION="Bug Fixes"; fi
          # Build changelog block
          ENTRY="## ${NEW_VERSION} (${TODAY})\n\n### ${SECTION}\n${COMMITS}\n"
          # Prepend to CHANGELOG.md (after the header line)
          if [ -f CHANGELOG.md ]; then
            head -n 3 CHANGELOG.md > CHANGELOG.tmp
            echo -e "\n${ENTRY}" >> CHANGELOG.tmp
            tail -n +4 CHANGELOG.md >> CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            echo -e "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi

      - name: Commit version bump and build
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json dist/solar-dashboard.js CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }} [skip ci]"
          git push

      - name: Create release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/solar-dashboard.js
          generate_release_notes: true
